apiVersion: v1
kind: Service
metadata:
  name: releaseit-frontend
spec:
  selector: { app: releaseit-frontend }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: releaseit-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector: { matchLabels: { app: releaseit-frontend } }
  template:
    metadata:
      labels: { app: releaseit-frontend }
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.frontend.pullPolicy | default "IfNotPresent" }}
          ports: [{ containerPort: 80 }]
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: releaseit
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: releaseit-frontend
                port: { number: 80 }
{{- end }}
