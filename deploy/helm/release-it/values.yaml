# Umbrella values. Each key matches a subchart name; anything you put under it
# overrides that subchart's own values.yaml. Defaults already work for a local
# minikube run, so this file only needs entries when you want to change them.
#
# The single shared Postgres and the per-service schema/user segregation live in
# the releaseit-db subchart; backend/auth point at it by default.

# releaseit-db:
#   storage: 5Gi
#   tenants:
#     - { user: releaseit, password: s3cret, schema: releaseit }
#     - { user: auth,      password: s3cret, schema: auth }

# releaseit-backend:
#   replicas: 2
#   solutionEnabled: true

# Default administrator credentials for the local stack. `allowInsecure: true`
# turns off the weak-password guard so the trivial admin/admin default below can
# be seeded — this is for local/dev only. For any real deployment set a strong
# password and drop allowInsecure, ideally via a secret:
#   --set releaseit-auth.auth.bootstrapAdmin.password=...
releaseit-auth:
  auth:
    bootstrapAdmin:
      username: admin
      password: admin
      allowInsecure: true

