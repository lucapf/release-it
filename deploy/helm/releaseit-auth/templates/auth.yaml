apiVersion: v1
kind: Service
metadata:
  name: releaseit-auth
spec:
  selector: { app: releaseit-auth }
  ports: [{ port: 8001, targetPort: 8001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: releaseit-auth
spec:
  replicas: {{ .Values.auth.replicas }}
  selector: { matchLabels: { app: releaseit-auth } }
  template:
    metadata:
      labels: { app: releaseit-auth }
    spec:
      containers:
        - name: auth
          image: {{ .Values.auth.image }}
          imagePullPolicy: {{ .Values.auth.pullPolicy  }}
          env:
            - name: AUTH_DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@releaseit-auth-db:5432/{{ .Values.postgres.database }}"
            - { name: AUTH_ISSUER, value: {{ .Values.auth.issuer | quote }} }
            - { name: AUTH_AUDIENCE, value: {{ .Values.auth.audience | quote }} }
            - { name: AUTH_PRIVATE_KEY_PEM, value: {{ .Values.auth.privateKeyPem | quote }} }
            - { name: AUTH_BOOTSTRAP_ADMIN_USERNAME, value: {{ .Values.auth.bootstrapAdmin.username | quote }} }
            - { name: AUTH_BOOTSTRAP_ADMIN_PASSWORD, value: {{ .Values.auth.bootstrapAdmin.password | quote }} }
          ports: [{ containerPort: 8001 }]
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
