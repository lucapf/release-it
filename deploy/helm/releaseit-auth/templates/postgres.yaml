apiVersion: v1
kind: Service
metadata:
  name: releaseit-auth-db
spec:
  selector: { app: releaseit-auth-db }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: releaseit-auth-db
spec:
  serviceName: releaseit-auth-db
  replicas: 1
  selector: { matchLabels: { app: releaseit-auth-db } }
  template:
    metadata:
      labels: { app: releaseit-auth-db }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - { name: POSTGRES_USER, value: {{ .Values.postgres.user | quote }} }
            - { name: POSTGRES_PASSWORD, value: {{ .Values.postgres.password | quote }} }
            - { name: POSTGRES_DB, value: {{ .Values.postgres.database | quote }} }
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: {{ .Values.postgres.storage }} } }
