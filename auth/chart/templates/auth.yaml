apiVersion: v1
kind: Service
metadata:
  name: releaseit-auth
spec:
  selector: { app: releaseit-auth }
  ports: [{ port: 8001, targetPort: 8001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: releaseit-auth
spec:
  replicas: {{ .Values.auth.replicas }}
  selector: { matchLabels: { app: releaseit-auth } }
  template:
    metadata:
      labels: { app: releaseit-auth }
    spec:
      containers:
        - name: auth
          image: {{ .Values.auth.image }}
          imagePullPolicy: {{ .Values.auth.pullPolicy  }}
          env:
            - name: AUTH_DATABASE_URL
              value: "postgresql://{{ .Values.db.user }}:{{ .Values.db.password }}@{{ .Values.db.host }}:{{ .Values.db.port }}/{{ .Values.db.database }}"
            - { name: AUTH_DB_POOL_MIN_SIZE, value: {{ .Values.auth.dbPool.minSize | quote }} }
            - { name: AUTH_DB_POOL_MAX_SIZE, value: {{ .Values.auth.dbPool.maxSize | quote }} }
            - { name: AUTH_ISSUER, value: {{ .Values.auth.issuer | quote }} }
            - { name: AUTH_AUDIENCE, value: {{ .Values.auth.audience | quote }} }
            - { name: AUTH_ACCESS_TOKEN_TTL_SECONDS, value: {{ .Values.auth.accessTokenTtlSeconds | quote }} }
            - { name: AUTH_ROLE_CLAIM, value: {{ .Values.auth.roleClaim | quote }} }
            - { name: AUTH_PRIVATE_KEY_PEM, value: {{ .Values.auth.privateKeyPem | quote }} }
            - { name: AUTH_BOOTSTRAP_ADMIN_USERNAME, value: {{ .Values.auth.bootstrapAdmin.username | quote }} }
            - { name: AUTH_BOOTSTRAP_ADMIN_PASSWORD, value: {{ .Values.auth.bootstrapAdmin.password | quote }} }
            - { name: AUTH_ALLOW_INSECURE_BOOTSTRAP, value: {{ .Values.auth.bootstrapAdmin.allowInsecure | default false | quote }} }
            - { name: AUTH_MIGRATIONS_DIR, value: {{ .Values.auth.migrationsDir | quote }} }
            - { name: AUTH_CORS_ORIGINS, value: {{ .Values.auth.corsOrigins | quote }} }
          ports: [{ containerPort: 8001 }]
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
