server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls. In Kubernetes these hostnames resolve to the services;
    # override via the ingress if backend/auth are exposed separately.
    location /api/v1/user-management {
        proxy_pass http://releaseit-auth:8001;
    }
    location /api {
        proxy_pass http://releaseit-backend:8000;
    }
}
